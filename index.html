<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>BMI Calculator</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div class="wrapper">
			<header>
				<h1 class="title">BMI Calculator</h1>
			</header>
			<main>
				<div class="bmi__wrapper">
					<form class="bmi__form">
						<label for="height" class="bmi__label">
							<input
								type="text"
								id="height"
								name="height"
								placeholder="Height in cm" />
						</label>
						<label for="weight" class="bmi__label">
							<input
								type="text"
								id="weight"
								name="weight"
								placeholder="Weight in kg" />
						</label>
						<p class="alert">Please fill in all fields</p>
						<button class="bmi__btn">Calculate</button>
					</form>
					<div class="bmi__result">
						<h4>Result:</h4>
						<input type="text" id="result-input" value="0" disabled />
					</div>
					<div class="bmi__description">
						<h2>BMI Weight Guide</h2>
						<p class="description__text">Under Weight: Less than 18.6</p>
						<p class="description__text">Normal Range: Between 18.6 and 24.9</p>
						<p class="description__text">Over Weight: Greater than 24.9</p>
					</div>
				</div>
			</main>
		</div>
		<script src="app.js"></script>
	</body>
</html>
